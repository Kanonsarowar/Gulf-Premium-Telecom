;============================================================================
; CDR (Call Detail Records) Configuration for Gulf Premium Telecom - IPRN
; Purpose: Call billing and reporting
; Version: Asterisk 16-20 compatible
;============================================================================

[general]
; Enable CDR
enable=yes

; CDR batch mode (better performance for high volume)
batch=no
size=100
time=300

; Schedule CDR processing
scheduler=yes
safeshutdown=yes

;----------------------------------------------------------------------------
; FIELD SETTINGS
;----------------------------------------------------------------------------

; End CDR before executing 'h' extension (recommended)
endbeforehexten=yes

; Initiate CDR on answer (not on dial)
initiatedseconds=no

; Log unanswered calls
unanswered=yes

; CDR on congestion
congestion=yes

;============================================================================
; CSV FILE OUTPUT (Master.csv)
;============================================================================

[csv]
; Enable CSV logging
usegmtime=no
loguniqueid=yes
loguserfield=yes
accountlogs=yes

; CSV file location
; Default: /var/log/asterisk/cdr-csv/Master.csv

;============================================================================
; CUSTOM CDR LOGGING
;============================================================================

; Custom format for detailed billing
; Uncomment and configure in cdr_custom.conf

;============================================================================
; DATABASE CDR (MySQL Example)
;============================================================================

; For MySQL CDR backend, configure /etc/odbcinst.ini and /etc/odbc.ini
; Then uncomment and configure cdr_mysql.conf or cdr_odbc.conf

;============================================================================
; CDR FIELD DESCRIPTIONS
;============================================================================
;
; Standard CDR fields:
; - accountcode: Account code for billing
; - src: Caller ID number (source)
; - dst: Destination number (called number)
; - dcontext: Destination context
; - clid: Caller ID with name
; - channel: Channel used for call
; - dstchannel: Destination channel
; - lastapp: Last application executed
; - lastdata: Last application data
; - start: Call start time
; - answer: Call answer time
; - end: Call end time
; - duration: Total call duration (seconds)
; - billsec: Billable seconds (after answer)
; - disposition: ANSWERED, NO ANSWER, BUSY, FAILED
; - amaflags: Automatic Message Accounting flags
; - uniqueid: Unique call identifier
; - userfield: User-defined field
;
;============================================================================
; END OF CDR CONFIGURATION
;============================================================================

;============================================================================
; Manager (AMI) Configuration for Gulf Premium Telecom - IPRN
; Purpose: Asterisk Manager Interface for monitoring and Asternic integration
; Version: Asterisk 16-20 compatible
; SECURITY WARNING: AMI provides full system access - secure carefully!
;============================================================================

[general]
; Enable AMI
enabled=yes

; Bind to localhost only for security (change if remote access needed)
; For Asternic on same server: 127.0.0.1
; For remote access: 0.0.0.0 (ensure firewall protection!)
bindaddr=127.0.0.1

; Port for AMI connections
port=5038

; Enable HTTP AMI (for web-based tools)
; webenabled=yes
; httptimeout=60

; Display connected managers in CLI
displayconnects=yes

; Timestamp format
timestampevents=yes

;============================================================================
; AMI USER: asternic
; Purpose: Asternic Call Center Stats monitoring
; Permissions: Read-only access to call and queue events
;============================================================================
[asternic]
; SECURITY: Change this password immediately!
secret=CHANGE_THIS_PASSWORD_asternic123

; Deny all by default, then permit specific actions
deny=0.0.0.0/0.0.0.0
permit=127.0.0.1/255.255.255.255

; Read permissions for monitoring
read=system,call,agent,reporting,dtmf,originate,message,queue,all

; Write permissions (minimal for Asternic)
write=originate,command

; Enable events
eventfilter=!Event: RTCPSent
eventfilter=!Event: RTCPReceived

; User friendly description
displayname=Asternic Call Center Monitor

;============================================================================
; AMI USER: admin
; Purpose: Administrative access for troubleshooting
; WARNING: Full system access - use with caution!
;============================================================================
[admin]
; SECURITY: Change this password immediately!
secret=CHANGE_THIS_PASSWORD_admin456

; Restrict to localhost only
deny=0.0.0.0/0.0.0.0
permit=127.0.0.1/255.255.255.255

; Full read/write permissions
read=all
write=all

; User friendly description
displayname=Administrator Access

;============================================================================
; AMI USER: monitoring
; Purpose: Read-only monitoring for external systems
;============================================================================
[monitoring]
; SECURITY: Change this password immediately!
secret=CHANGE_THIS_PASSWORD_monitor789

; Access control - adjust as needed
deny=0.0.0.0/0.0.0.0
permit=127.0.0.1/255.255.255.255
; Add trusted monitoring server IPs:
; permit=192.168.1.100/255.255.255.255

; Read-only permissions
read=system,call,agent,reporting,cdr,dialplan,originate

; No write permissions
write=

; Filter noisy events for better performance
eventfilter=!Event: RTCPSent
eventfilter=!Event: RTCPReceived
eventfilter=!Event: VarSet
eventfilter=!Event: Newexten

displayname=Monitoring System

;============================================================================
; AMI USER: queue_manager
; Purpose: Queue management for supervisors
;============================================================================
[queue_manager]
; SECURITY: Change this password immediately!
secret=CHANGE_THIS_PASSWORD_queue321

deny=0.0.0.0/0.0.0.0
permit=127.0.0.1/255.255.255.255

; Queue-specific permissions
read=system,call,agent,queue,all
write=agent,originate

; Filter events
eventfilter=!Event: RTCPSent
eventfilter=!Event: RTCPReceived

displayname=Queue Supervisor

;============================================================================
; SECURITY BEST PRACTICES
;============================================================================
;
; 1. CHANGE ALL PASSWORDS IMMEDIATELY
;    - Use strong, unique passwords (20+ characters)
;    - Use password generators
;    - Rotate passwords regularly
;
; 2. RESTRICT IP ACCESS
;    - Use permit/deny directives
;    - Only allow trusted IPs
;    - Use firewall rules (iptables/firewalld)
;
; 3. USE ENCRYPTION
;    - Consider AMI over SSH tunnel
;    - Use VPN for remote access
;    - Enable TLS if supported
;
; 4. PRINCIPLE OF LEAST PRIVILEGE
;    - Only grant necessary permissions
;    - Use separate accounts for different purposes
;    - Regularly audit AMI access logs
;
; 5. MONITORING
;    - Log all AMI connections
;    - Monitor for suspicious activity
;    - Set up alerts for unauthorized access attempts
;
; 6. FIREWALL RULES (iptables example)
;    # Allow AMI only from localhost
;    iptables -A INPUT -p tcp --dport 5038 -s 127.0.0.1 -j ACCEPT
;    iptables -A INPUT -p tcp --dport 5038 -j DROP
;
;    # Allow AMI from specific monitoring server
;    iptables -A INPUT -p tcp --dport 5038 -s 192.168.1.100 -j ACCEPT
;    iptables -A INPUT -p tcp --dport 5038 -j DROP
;
;============================================================================
; AMI TROUBLESHOOTING
;============================================================================
;
; TEST AMI CONNECTION:
; telnet localhost 5038
;   Action: Login
;   Username: admin
;   Secret: your_password
;
; USEFUL AMI COMMANDS:
;   Action: QueueStatus - Show queue status
;   Action: QueueSummary - Show queue summary
;   Action: Ping - Test connection
;   Action: CoreShowChannels - Show active channels
;   Action: Command (Command: pjsip show endpoints) - Run CLI command
;
; CHECK AMI LOGS:
; grep -i "manager" /var/log/asterisk/messages
;
; DEBUG AMI:
; asterisk -rvvv
; manager set debug on
;
;============================================================================
; ASTERNIC INTEGRATION NOTES
;============================================================================
;
; Asternic Call Center Stats requires:
; 1. AMI access with read permissions for: call, agent, queue events
; 2. Access to /var/log/asterisk/queue_log file
; 3. Database access for CDR (if using database backend)
;
; Asternic AMI Events Used:
; - QueueMember
; - QueueParams
; - AgentCalled
; - AgentConnect
; - AgentComplete
; - Join
; - Leave
; - Abandon
;
;============================================================================
; END OF MANAGER CONFIGURATION
;============================================================================

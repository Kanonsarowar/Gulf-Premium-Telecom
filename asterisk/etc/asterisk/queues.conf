;============================================================================
; Queues Configuration for Gulf Premium Telecom - IPRN
; Purpose: Call center queue configuration for inbound calls
; Version: Asterisk 16-20 compatible
;============================================================================

[general]
; Persist dynamic members across restarts
persistentmembers=yes

; Update CDR with queue information
shared_lastcall=yes

; Music on hold class for queues
; (Configure in musiconhold.conf)
musicclass=default

; Monitor type for call recording
; Valid values: MixMonitor
monitor-type=MixMonitor

; Update stats even when channel has not been answered
updatecdr=yes

;============================================================================
; QUEUE: sales
; Purpose: Sales department queue
;============================================================================
[sales]
; Queue strategy options:
; - ringall: Ring all available agents simultaneously
; - leastrecent: Ring agent who has been idle the longest
; - fewestcalls: Ring agent who has taken fewest calls
; - random: Ring random agent
; - rrmemory: Round-robin with memory (recommended for even distribution)
strategy=rrmemory

; Retry timeout (seconds between retries to same agent)
timeout=15

; Retry interval (seconds before trying next agent)
retry=5

; Weight (higher weight = higher priority vs other queues)
weight=0

; Wrap-up time (seconds after call before agent gets next call)
wrapuptime=15

; Maximum wait time (seconds)
maxlen=50

; Announce position in queue
announce-frequency=30
announce-holdtime=yes
announce-position=yes
announce-position-limit=5

; Join empty queue settings
; yes = callers can enter even if no agents available
; no = callers cannot enter if no agents
; strict = callers cannot enter if no agents logged in
joinempty=yes

; Leave empty queue settings
; yes = caller is removed if all agents become unavailable
; no = caller stays in queue
; strict = caller removed if no agents logged in
leavewhenempty=no

; Ring in use (call agents even if on another call)
ringinuse=no

; Music on hold
musicclass=default

; Service level (seconds - for statistics)
servicelevel=60

; Queue members (static members - can also use dynamic via AMI)
; Format: member => technology/resource,penalty,membername,state_interface
; Example:
; member => PJSIP/1001,0,Sales Agent 1,hint:1001@internal-extensions
; member => PJSIP/1002,0,Sales Agent 2,hint:1002@internal-extensions

; Monitor format for call recording
monitor-format=wav

; Auto-fill: distribute calls evenly vs filling agents sequentially
autofill=yes

; Auto-pause: automatically pause agents who don't answer
autopause=yes

; Auto-pause delay: seconds before auto-pausing
autopausedelay=10

; Report hold time
reportholdtime=yes

; Member delay: seconds to wait before connecting (for agent preparation)
memberdelay=0

; Time to wait before retrying a busy agent
timeoutpriority=conf

;============================================================================
; QUEUE: support
; Purpose: Technical support queue
;============================================================================
[support]
strategy=rrmemory
timeout=20
retry=5
weight=1
wrapuptime=20
maxlen=100
announce-frequency=45
announce-holdtime=yes
announce-position=yes
announce-position-limit=10
joinempty=yes
leavewhenempty=no
ringinuse=no
musicclass=default
servicelevel=90
monitor-format=wav
autofill=yes
autopause=yes
autopausedelay=15
reportholdtime=yes

; Support team members
; member => PJSIP/1101,0,Support Agent 1,hint:1101@internal-extensions
; member => PJSIP/1102,0,Support Agent 2,hint:1102@internal-extensions

;============================================================================
; QUEUE: billing
; Purpose: Billing department queue
;============================================================================
[billing]
strategy=rrmemory
timeout=15
retry=5
weight=0
wrapuptime=10
maxlen=30
announce-frequency=30
announce-holdtime=yes
announce-position=yes
joinempty=yes
leavewhenempty=no
ringinuse=no
musicclass=default
servicelevel=60
monitor-format=wav
autofill=yes
autopause=yes

; Billing team members
; member => PJSIP/1201,0,Billing Agent 1,hint:1201@internal-extensions

;============================================================================
; QUEUE: operator
; Purpose: Operator/receptionist queue (highest priority)
;============================================================================
[operator]
strategy=ringall
timeout=10
retry=3
weight=2
wrapuptime=5
maxlen=20
announce-frequency=0
announce-holdtime=no
announce-position=no
joinempty=yes
leavewhenempty=no
ringinuse=no
musicclass=default
servicelevel=30
monitor-format=wav
autofill=yes
autopause=no

; Operator members
; member => PJSIP/1000,0,Receptionist,hint:1000@internal-extensions

;============================================================================
; QUEUE: vip
; Purpose: VIP customer queue (premium service)
;============================================================================
[vip]
strategy=ringall
timeout=10
retry=2
weight=10
wrapuptime=30
maxlen=20
announce-frequency=0
announce-holdtime=no
announce-position=no
joinempty=yes
leavewhenempty=no
ringinuse=yes
musicclass=default
servicelevel=20
monitor-format=wav
autofill=yes
autopause=no
reportholdtime=yes

;============================================================================
; NOTES FOR QUEUE MANAGEMENT
;============================================================================
;
; ADDING DYNAMIC MEMBERS (via AMI or CLI):
; CLI command: queue add member PJSIP/1001 to sales
; CLI command: queue remove member PJSIP/1001 from sales
; CLI command: queue show
;
; ASTERNIC CALL CENTER INTEGRATION:
; - Ensure AMI is configured (manager.conf)
; - Queue logs are written to /var/log/asterisk/queue_log
; - Use "queue_log=yes" in logger.conf
;
; MONITORING:
; - Use "queue show" command to view real-time status
; - Check /var/log/asterisk/queue_log for historical data
; - Monitor agent status via AMI events
;
; TROUBLESHOOTING:
; - No agents available: Check agent login status
; - Calls not distributing: Verify strategy and ringinuse settings
; - Long wait times: Add more agents or adjust timeout values
; - Agents not getting calls: Check pause status and penalty values
;
;============================================================================
; END OF QUEUES CONFIGURATION
;============================================================================

; CDR Configuration for PostgreSQL
; Call Detail Records will be stored in the database

[general]
enable=yes
unanswered=yes

[pgsql]
connection=gulf_telecom
table=call_detail_records
columns => uniqueid,linkedid,allocated_number,destination_number,caller_id,start_time,answer_time,end_time,duration,billsec,disposition,hangup_cause

; Map CDR fields to database columns
alias start => start_time
alias answer => answer_time
alias end => end_time
alias src => caller_id
alias dst => allocated_number
alias billsec => billsec
alias duration => duration
alias disposition => disposition
alias accountcode => destination_number

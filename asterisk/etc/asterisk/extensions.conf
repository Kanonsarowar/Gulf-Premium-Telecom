;============================================================================
; Dialplan Configuration for Gulf Premium Telecom - IPRN
; Purpose: Inbound call routing and processing
; Version: Asterisk 16-20 compatible
;============================================================================

[general]
static=yes
writeprotect=no
clearglobalvars=no
priorityjumping=no

;----------------------------------------------------------------------------
; GLOBAL VARIABLES
;----------------------------------------------------------------------------
[globals]
; Company information
COMPANY_NAME=Gulf Premium Telecom
COMPANY_SHORT=GPT

; Trunk identifiers
TRUNK_PREMIUM=PJSIP/upstream-provider-1
TRUNK_STANDARD=PJSIP/upstream-provider-2
TRUNK_ASIA=PJSIP/upstream-provider-3

; Default timeouts
RING_TIMEOUT=30
QUEUE_TIMEOUT=300
IVR_TIMEOUT=10
IVR_DIGIT_TIMEOUT=5

; Recording settings
RECORDING_PATH=/var/spool/asterisk/monitor
RECORDING_FORMAT=wav

; Emergency numbers (Saudi Arabia)
EMERGENCY_999=999
EMERGENCY_997=997
EMERGENCY_911=911

;----------------------------------------------------------------------------
; CONTEXT: from-upstream
; Purpose: Handle all inbound calls from upstream providers
; Security: This context is entered by upstream providers only
;----------------------------------------------------------------------------
[from-upstream]
; Log incoming call
exten => _X.,1,NoOp(=== INBOUND CALL from ${CHANNEL(pjsip,remote_addr)} ===)
same => n,NoOp(Caller: ${CALLERID(all)} | DID: ${EXTEN} | Unique ID: ${UNIQUEID})
same => n,Set(CHANNEL(language)=en)
same => n,Set(CHANNEL(musicclass)=default)

; Set caller ID variables for tracking
same => n,Set(CDR(accountcode)=${CUT(CHANNEL,/,2)})
same => n,Set(CDR(provider)=${CUT(CHANNEL,/,2)})
same => n,Set(__INBOUND_DID=${EXTEN})
same => n,Set(__INBOUND_CALLERID=${CALLERID(num)})

; Anti-spoofing: Log source IP
same => n,Set(CDR(src_ip)=${CHANNEL(pjsip,remote_addr)})

; Check if DID is valid (10-15 digits typical for international)
same => n,GotoIf($[${LEN(${EXTEN})} < 4]?invalid_number)
same => n,GotoIf($[${LEN(${EXTEN})} > 20]?invalid_number)

; Answer the call before processing
same => n,Answer()
same => n,Wait(0.5)

; Route based on DID pattern
same => n,Goto(did-routing,${EXTEN},1)

; Invalid number handling
same => n(invalid_number),NoOp(Invalid number format: ${EXTEN})
same => n,Playback(ss-noservice)
same => n,Hangup(1)

; Catch all for any issues
exten => h,1,NoOp(=== Call Ended: ${DIALSTATUS} | Duration: ${CDR(duration)}s | Billsec: ${CDR(billsec)}s ===)

; Handle failed calls
exten => failed,1,NoOp(Call routing failed)
same => n,Playback(cannot-complete-as-dialed)
same => n,Hangup(1)

;----------------------------------------------------------------------------
; CONTEXT: did-routing
; Purpose: Route calls based on DID (Direct Inward Dial) numbers
; NOTE: Configure your actual DID routing rules here
;----------------------------------------------------------------------------
[did-routing]
; Example: Main company number routes to IVR
exten => _966XXXXXXXXX,1,NoOp(Saudi number detected: ${EXTEN})
same => n,Goto(ivr-main,s,1)

; Example: Specific DID patterns for different departments
exten => _966501234567,1,NoOp(Sales DID)
same => n,Goto(queue-sales,s,1)

exten => _966507654321,1,NoOp(Support DID)
same => n,Goto(queue-support,s,1)

; Example: Direct extension routing (last 4 digits)
exten => _966XXXXXX1000,1,NoOp(Extension 1000)
same => n,Goto(internal-extensions,1000,1)

; UAE numbers
exten => _971XXXXXXXXX,1,NoOp(UAE number detected: ${EXTEN})
same => n,Goto(ivr-main,s,1)

; Asian destination numbers
exten => _91XXXXXXXXXX,1,NoOp(India number detected: ${EXTEN})
same => n,Goto(ivr-main,s,1)

exten => _92XXXXXXXXXX,1,NoOp(Pakistan number detected: ${EXTEN})
same => n,Goto(ivr-main,s,1)

; Generic international number pattern
exten => _+X.,1,NoOp(International number: ${EXTEN})
same => n,Goto(ivr-main,s,1)

; Default: route all unknown DIDs to main IVR
exten => _X.,1,NoOp(Unknown DID pattern: ${EXTEN})
same => n,Goto(ivr-main,s,1)

;----------------------------------------------------------------------------
; CONTEXT: ivr-main
; Purpose: Main IVR menu for inbound calls
;----------------------------------------------------------------------------
[ivr-main]
exten => s,1,NoOp(=== Main IVR Menu ===)
same => n,Set(IVR_RETRIES=0)
same => n(start),Background(welcome)  ; "Welcome to Gulf Premium Telecom"
same => n,Background(pls-hold-while-try)  ; Menu options
same => n,Background(press-1)  ; "Press 1 for Sales"
same => n,Background(press-2)  ; "Press 2 for Support"
same => n,Background(press-3)  ; "Press 3 for Billing"
same => n,Background(press-0)  ; "Press 0 for Operator"
same => n,WaitExten(${IVR_TIMEOUT})

; Handle timeout
same => n,Set(IVR_RETRIES=$[${IVR_RETRIES} + 1])
same => n,GotoIf($[${IVR_RETRIES} < 3]?start)
same => n,Playback(goodbye)
same => n,Hangup()

; IVR Options
exten => 1,1,NoOp(Sales selected)
same => n,Goto(queue-sales,s,1)

exten => 2,1,NoOp(Support selected)
same => n,Goto(queue-support,s,1)

exten => 3,1,NoOp(Billing selected)
same => n,Goto(queue-billing,s,1)

exten => 0,1,NoOp(Operator requested)
same => n,Goto(queue-operator,s,1)

exten => 9,1,NoOp(Directory access)
same => n,Directory(default)

; Invalid option
exten => i,1,Playback(invalid)
same => n,Goto(s,start)

; Timeout
exten => t,1,Goto(s,1)

;----------------------------------------------------------------------------
; CONTEXT: queue-sales
; Purpose: Sales queue
;----------------------------------------------------------------------------
[queue-sales]
exten => s,1,NoOp(=== Sales Queue ===)
same => n,Set(CHANNEL(musicclass)=default)
same => n,Answer()
same => n,Playback(please-hold)
same => n,Queue(sales,tT,,,${QUEUE_TIMEOUT},,,)
same => n,GotoIf($["${QUEUESTATUS}" = "TIMEOUT"]?timeout)
same => n,GotoIf($["${QUEUESTATUS}" = "FULL"]?full)
same => n,GotoIf($["${QUEUESTATUS}" = "JOINEMPTY"]?unavailable)
same => n,GotoIf($["${QUEUESTATUS}" = "LEAVEEMPTY"]?unavailable)
same => n,Hangup()

same => n(timeout),Playback(all-agents-busy)
same => n,Voicemail(sales@default,u)
same => n,Hangup()

same => n(full),Playback(queue-full)
same => n,Hangup()

same => n(unavailable),Playback(no-agents-available)
same => n,Hangup()

;----------------------------------------------------------------------------
; CONTEXT: queue-support
; Purpose: Technical support queue
;----------------------------------------------------------------------------
[queue-support]
exten => s,1,NoOp(=== Support Queue ===)
same => n,Set(CHANNEL(musicclass)=default)
same => n,Answer()
same => n,Playback(please-hold)
same => n,Queue(support,tT,,,${QUEUE_TIMEOUT},,,)
same => n,GotoIf($["${QUEUESTATUS}" = "TIMEOUT"]?timeout)
same => n,GotoIf($["${QUEUESTATUS}" = "FULL"]?full)
same => n,Hangup()

same => n(timeout),Playback(all-agents-busy)
same => n,Voicemail(support@default,u)
same => n,Hangup()

same => n(full),Playback(queue-full)
same => n,Hangup()

;----------------------------------------------------------------------------
; CONTEXT: queue-billing
; Purpose: Billing department queue
;----------------------------------------------------------------------------
[queue-billing]
exten => s,1,NoOp(=== Billing Queue ===)
same => n,Set(CHANNEL(musicclass)=default)
same => n,Answer()
same => n,Playback(please-hold)
same => n,Queue(billing,tT,,,${QUEUE_TIMEOUT},,,)
same => n,Hangup()

;----------------------------------------------------------------------------
; CONTEXT: queue-operator
; Purpose: Operator/receptionist queue
;----------------------------------------------------------------------------
[queue-operator]
exten => s,1,NoOp(=== Operator Queue ===)
same => n,Set(CHANNEL(musicclass)=default)
same => n,Answer()
same => n,Playback(please-hold)
same => n,Queue(operator,tT,,,${QUEUE_TIMEOUT},,,)
same => n,Hangup()

;----------------------------------------------------------------------------
; CONTEXT: internal-extensions
; Purpose: Internal extensions for direct dialing
;----------------------------------------------------------------------------
[internal-extensions]
; Extension 1000 - Reception
exten => 1000,1,NoOp(Calling Reception - 1000)
same => n,Dial(PJSIP/1000,${RING_TIMEOUT},tT)
same => n,Hangup()

; Extension 1001-1099 - Sales team
exten => _10[0-9]X,1,NoOp(Calling Sales extension ${EXTEN})
same => n,Dial(PJSIP/${EXTEN},${RING_TIMEOUT},tT)
same => n,Hangup()

; Extension 1100-1199 - Support team
exten => _11[0-9]X,1,NoOp(Calling Support extension ${EXTEN})
same => n,Dial(PJSIP/${EXTEN},${RING_TIMEOUT},tT)
same => n,Hangup()

;----------------------------------------------------------------------------
; CONTEXT: from-internal
; Purpose: Internal users making outbound calls
;----------------------------------------------------------------------------
[from-internal]
exten => _X.,1,NoOp(=== Outbound call from internal user ===)
same => n,NoOp(Extension: ${CALLERID(num)} | Destination: ${EXTEN})
same => n,Set(CALLERID(name)=${COMPANY_SHORT})

; Route to appropriate trunk (add your routing logic here)
same => n,Dial(${TRUNK_PREMIUM}/${EXTEN},${RING_TIMEOUT},tT)
same => n,Hangup()

;----------------------------------------------------------------------------
; CONTEXT: recording-test
; Purpose: Test call recording functionality
;----------------------------------------------------------------------------
[recording-test]
exten => s,1,NoOp(=== Call Recording Test ===)
same => n,Answer()
same => n,Wait(1)
same => n,Set(RECORDING_FILE=${RECORDING_PATH}/${UNIQUEID})
same => n,MixMonitor(${RECORDING_FILE}.${RECORDING_FORMAT},b)
same => n,Playback(demo-congrats)
same => n,StopMixMonitor()
same => n,Hangup()

;----------------------------------------------------------------------------
; CONTEXT: audio-test
; Purpose: Test audio quality and connectivity
;----------------------------------------------------------------------------
[audio-test]
exten => s,1,NoOp(=== Audio Quality Test ===)
same => n,Answer()
same => n,Wait(1)
same => n,Playback(demo-echotest)
same => n,Echo()
same => n,Hangup()

;============================================================================
; END OF DIALPLAN CONFIGURATION
;============================================================================

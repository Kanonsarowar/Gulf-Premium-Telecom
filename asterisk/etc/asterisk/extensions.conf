; Extensions configuration for Gulf Premium Telecom
; This dialplan uses AGI for dynamic routing

[general]
static=yes
writeprotect=no

[globals]
; Global variables

[from-trunk]
; Incoming calls from carrier trunk
exten => _X.,1,NoOp(Incoming call from ${CALLERID(num)} to ${EXTEN})
 same => n,Set(CHANNEL(hangup_handler_push)=hangup-handler,s,1)
 same => n,Set(CDR(allocated_number)=${EXTEN})
 same => n,AGI(agi://127.0.0.1:4573)
 same => n,NoOp(Routing Result: ${ROUTING_RESULT})
 same => n,GotoIf($["${ROUTING_RESULT}" = "success"]?route-call:no-destination)
 
 ; Route based on routing type
 same => n(route-call),GotoIf($["${ROUTING_TYPE}" = "direct"]?route-direct)
 same => n,GotoIf($["${ROUTING_TYPE}" = "queue"]?route-queue)
 same => n,GotoIf($["${ROUTING_TYPE}" = "ivr"]?route-ivr)
 same => n,Goto(route-voicemail)
 
 ; Direct routing
 same => n(route-direct),NoOp(Routing to direct: ${DESTINATION_NUMBER})
 same => n,Dial(PJSIP/${DESTINATION_NUMBER}@outbound-trunk,60,tT)
 same => n,Goto(call-end)
 
 ; Queue routing
 same => n(route-queue),NoOp(Routing to queue: ${DESTINATION_NUMBER})
 same => n,Queue(${DESTINATION_NUMBER},tT,,,300)
 same => n,Goto(call-end)
 
 ; IVR routing
 same => n(route-ivr),NoOp(Routing to IVR: ${DESTINATION_NUMBER})
 same => n,Background(welcome)
 same => n,WaitExten(10)
 same => n,Goto(call-end)
 
 ; Voicemail routing
 same => n(route-voicemail),NoOp(Routing to voicemail: ${DESTINATION_NUMBER})
 same => n,VoiceMail(${DESTINATION_NUMBER}@default,su)
 same => n,Goto(call-end)
 
 ; No destination found
 same => n(no-destination),NoOp(No valid destination)
 same => n,Playback(ss-noservice)
 same => n,Hangup()
 
 ; Call completed
 same => n(call-end),NoOp(Call completed)
 same => n,Hangup()

[hangup-handler]
exten => s,1,NoOp(Call ended - CDR will be recorded)
 same => n,Return()

;============================================================================
; PJSIP Configuration for Gulf Premium Telecom - IPRN
; Purpose: IP-to-IP routing for inbound calls from upstream providers
; Version: Asterisk 16-20 compatible
;============================================================================

;----------------------------------------------------------------------------
; TRANSPORT CONFIGURATION
;----------------------------------------------------------------------------
[transport-udp]
type=transport
protocol=udp
bind=0.0.0.0:5060
; External address for NAT environments - REPLACE with your public IP
; external_media_address=YOUR_PUBLIC_IP
; external_signaling_address=YOUR_PUBLIC_IP

; RTP settings
tos=ef
cos=5

;----------------------------------------------------------------------------
; GLOBAL SETTINGS
;----------------------------------------------------------------------------
[global]
type=global
max_forwards=70
user_agent=Gulf-Premium-IPRN
default_outbound_endpoint=default_endpoint
keep_alive_interval=90
contact_expiration_check_interval=30
disable_multi_domain=yes

;----------------------------------------------------------------------------
; SYSTEM SETTINGS
;----------------------------------------------------------------------------
[system]
type=system
timer_t1=500
timer_b=32000
compact_headers=no
threadpool_initial_size=5
threadpool_auto_increment=5
threadpool_idle_timeout=60
threadpool_max_size=50

;----------------------------------------------------------------------------
; ACL (Access Control List) for Upstream Providers
; CRITICAL: Define allowed upstream IP addresses here
;----------------------------------------------------------------------------
[acl]
type=acl
; Add your upstream provider IPs here - EXAMPLES ONLY, REPLACE WITH REAL IPs
; deny=0.0.0.0/0.0.0.0
; permit=203.0.113.0/24
; permit=198.51.100.0/24
; permit=192.0.2.0/24

;----------------------------------------------------------------------------
; TEMPLATE: Base configuration for upstream trunks
;----------------------------------------------------------------------------
[upstream-trunk-template](!)
type=endpoint
context=from-upstream
transport=transport-udp
disallow=all
allow=ulaw
allow=alaw
allow=g729
direct_media=no
trust_id_inbound=yes
send_rpid=yes
send_pai=yes
rpid_immediate=yes
trust_id_outbound=yes
from_domain=gulf-premium.telecom
rtp_symmetric=yes
rewrite_contact=yes
force_rport=yes
dtmf_mode=rfc4733
ice_support=no
use_avpf=no
media_encryption=no
100rel=no
timers=no
; Anti-flood protection
max_audio_streams=1
max_video_streams=0

; RTP timeout settings (important for detecting dead calls)
rtp_timeout=120
rtp_timeout_hold=300
rtp_keepalive=30

; Codec preferences
codec_prefs_incoming_offer=prefer:pending,operation:intersect,keep:all
codec_prefs_outgoing_offer=prefer:pending,operation:union,keep:all
codec_prefs_incoming_answer=prefer:pending,operation:intersect,keep:all
codec_prefs_outgoing_answer=prefer:pending,operation:intersect,keep:all

[upstream-identify-template](!)
type=identify
match_header=X-Gulf-Premium: true

;----------------------------------------------------------------------------
; UPSTREAM PROVIDER 1 - PREMIUM ROUTE (EXAMPLE CONFIGURATION)
; ACTION REQUIRED: Replace with actual provider details
;----------------------------------------------------------------------------
[upstream-provider-1](upstream-trunk-template)
; Unique configuration for provider 1
endpoint_identifier_order=ip,username,anonymous
; No authentication required for IP-based trunking
auth_type=none
; Caller ID handling
callerid=Premium Route <+966>
; Quality of Service
tos_audio=ef
cos_audio=5

[upstream-provider-1-identify](upstream-identify-template)
endpoint=upstream-provider-1
; REPLACE with actual upstream IP addresses
match=203.0.113.10
match=203.0.113.11
match=203.0.113.12

;----------------------------------------------------------------------------
; UPSTREAM PROVIDER 2 - STANDARD ROUTE (EXAMPLE CONFIGURATION)
; ACTION REQUIRED: Replace with actual provider details
;----------------------------------------------------------------------------
[upstream-provider-2](upstream-trunk-template)
endpoint_identifier_order=ip,username,anonymous
auth_type=none
callerid=Standard Route <+966>
tos_audio=ef
cos_audio=5

[upstream-provider-2-identify](upstream-identify-template)
endpoint=upstream-provider-2
; REPLACE with actual upstream IP addresses
match=198.51.100.20
match=198.51.100.21

;----------------------------------------------------------------------------
; UPSTREAM PROVIDER 3 - ASIA ROUTE (EXAMPLE CONFIGURATION)
; ACTION REQUIRED: Replace with actual provider details
;----------------------------------------------------------------------------
[upstream-provider-3](upstream-trunk-template)
endpoint_identifier_order=ip,username,anonymous
auth_type=none
callerid=Asia Route <+966>
tos_audio=ef
cos_audio=5

[upstream-provider-3-identify](upstream-identify-template)
endpoint=upstream-provider-3
; REPLACE with actual upstream IP addresses
match=192.0.2.30
match=192.0.2.31
match=192.0.2.32

;----------------------------------------------------------------------------
; DOWNSTREAM/OUTBOUND ENDPOINT TEMPLATE (for routing calls out)
;----------------------------------------------------------------------------
[downstream-trunk-template](!)
type=endpoint
context=from-internal
transport=transport-udp
disallow=all
allow=ulaw
allow=alaw
allow=g729
direct_media=no
trust_id_outbound=yes
send_rpid=yes
send_pai=yes
from_domain=gulf-premium.telecom
rtp_symmetric=yes
force_rport=yes
dtmf_mode=rfc4733
rtp_timeout=120
rtp_timeout_hold=300
rtp_keepalive=30

;----------------------------------------------------------------------------
; AOR (Address of Record) Configuration - for registration-based trunks
; Not needed for IP-to-IP but included for completeness
;----------------------------------------------------------------------------
[aor-template](!)
type=aor
max_contacts=1
qualify_frequency=60
qualify_timeout=3.0
remove_existing=yes

;----------------------------------------------------------------------------
; REGISTRATION - for outbound trunks that require registration
; Not needed for inbound IP-to-IP but included for completeness
;----------------------------------------------------------------------------
[registration-template](!)
type=registration
transport=transport-udp
retry_interval=60
max_retries=10
auth_rejection_permanent=yes
fatal_retry_interval=30
forbidden_retry_interval=30

;============================================================================
; END OF PJSIP CONFIGURATION
;============================================================================

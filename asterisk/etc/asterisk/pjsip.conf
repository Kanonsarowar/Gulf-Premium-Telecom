; PJSIP Configuration for Gulf Premium Telecom
; This file configures SIP trunks for inbound call handling

[global]
type=global
max_forwards=70
keep_alive_interval=90
contact_expiration_check_interval=30
disable_multi_domain=yes
max_initial_qualify_time=4

[transport-udp]
type=transport
protocol=udp
bind=0.0.0.0:5060
external_media_address=YOUR_PUBLIC_IP
external_signaling_address=YOUR_PUBLIC_IP
local_net=192.168.0.0/16
local_net=10.0.0.0/8

; Example Carrier Trunk Template
[carrier-trunk-template](!)
type=endpoint
context=from-trunk
dtmf_mode=rfc4733
disallow=all
allow=ulaw,alaw,g729
direct_media=no
trust_id_inbound=yes
send_pai=yes
send_rpid=yes
rtp_symmetric=yes
force_rport=yes
rewrite_contact=yes

[carrier-trunk-template-aor](!)
type=aor
max_contacts=10
qualify_frequency=60

[carrier-trunk-template-identify](!)
type=identify
match_header=From

; Example Carrier Configuration
[carrier-1](carrier-trunk-template)
; Endpoint inherits from template

[carrier-1-aor](carrier-trunk-template-aor)
; AOR inherits from template

[carrier-1-identify](carrier-trunk-template-identify)
endpoint=carrier-1
match=203.0.113.1/32
; Add your carrier's IP addresses here

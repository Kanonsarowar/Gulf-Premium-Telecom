load => app_stasis.so
load => app_transfer.so
load => app_userevent.so
load => app_stream_echo.so

;============================================================================
; CODECS (Voice Compression)
;============================================================================

; Standard codecs for telecom
load => codec_ulaw.so
load => codec_alaw.so
load => codec_gsm.so
load => codec_g722.so
load => codec_g726.so
load => codec_adpcm.so
load => codec_resample.so

; G.729 (if licensed - comment out if not available)
; load => codec_g729.so

;============================================================================
; FORMATS (File Handling)
;============================================================================

load => format_gsm.so
load => format_wav.so
load => format_wav_gsm.so
load => format_pcm.so
load => format_g729.so
load => format_g723.so
load => format_g726.so
load => format_sln.so
load => format_h264.so
load => format_mp3.so

;============================================================================
; CDR (Call Detail Records) - CRITICAL for billing
;============================================================================

load => cdr_custom.so
load => cdr_csv.so
load => cdr_manager.so
load => cdr_syslog.so

; Database CDR (uncomment if using MySQL/PostgreSQL)
; load => cdr_mysql.so
; load => cdr_odbc.so
; load => cdr_pgsql.so
; load => cdr_sqlite3_custom.so

;============================================================================
; CEL (Channel Event Logging) - For detailed call tracking
;============================================================================

load => cel_custom.so
load => cel_manager.so

; Database CEL (uncomment if needed)
; load => cel_odbc.so
; load => cel_pgsql.so
; load => cel_sqlite3_custom.so

;============================================================================
; CHANNEL DRIVERS
;============================================================================

; Local channel for call routing
load => chan_pjsip.so
load => chan_bridge_media.so

; Optional: Legacy SIP (only if needed for compatibility)
; noload => chan_sip.so

;============================================================================
; MANAGER INTERFACE (AMI) - For Asternic and monitoring
;============================================================================

load => manager.so

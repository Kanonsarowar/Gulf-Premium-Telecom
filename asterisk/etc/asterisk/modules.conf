;============================================================================
; Modules Configuration for Gulf Premium Telecom - IPRN
; Purpose: Load only necessary modules for optimal performance
; Version: Asterisk 16-20 compatible
;============================================================================

[modules]
autoload=yes

;============================================================================
; CRITICAL MODULES FOR INBOUND CALL HANDLING
;============================================================================

; PJSIP - Modern SIP stack (REQUIRED for IP-to-IP routing)
load => res_pjsip.so
load => res_pjsip_session.so
load => res_pjsip_endpoint_identifier_ip.so
load => res_pjsip_endpoint_identifier_user.so
load => res_pjsip_endpoint_identifier_anonymous.so
load => res_pjsip_authenticator_digest.so
load => res_pjsip_auth.so
load => res_pjsip_caller_id.so
load => res_pjsip_registrar.so
load => res_pjsip_outbound_registration.so
load => res_pjsip_sdp_rtp.so
load => res_pjsip_transport_management.so
load => res_pjsip_dialog_info_body_generator.so
load => res_pjsip_dlg_options.so
load => res_pjsip_dtmf_info.so
load => res_pjsip_log_forwarder.so
load => res_pjsip_messaging.so
load => res_pjsip_mwi.so
load => res_pjsip_mwi_body_generator.so
load => res_pjsip_notify.so
load => res_pjsip_one_touch_record_info.so
load => res_pjsip_refer.so
load => res_pjsip_rfc3326.so
load => res_pjsip_send_to_voicemail.so
load => res_pjsip_t38.so
load => res_pjsip_transport_websocket.so

; PJSIP ACL support
load => res_pjsip_acl.so

; RTP
load => res_rtp_asterisk.so
load => res_rtp_multicast.so

; Core resources
load => res_timing_timerfd.so
load => res_timing_pthread.so

;============================================================================
; DIALPLAN AND APPLICATIONS
;============================================================================

; Core dialplan
load => pbx_config.so
load => pbx_realtime.so
load => pbx_spool.so

; Essential applications
load => app_dial.so
load => app_playback.so
load => app_voicemail.so
load => app_directory.so
load => app_echo.so
load => app_queue.so
load => app_stack.so

;============================================================================
; RTP Configuration for Gulf Premium Telecom - IPRN
; Purpose: Real-time Transport Protocol settings for voice media
; Version: Asterisk 16-20 compatible
;============================================================================

[general]
; RTP port range (CRITICAL: Ensure firewall allows these UDP ports)
; Standard range for high-volume systems
rtpstart=10000
rtpend=20000

; RTP packet settings
rtpchecksums=yes

; Enable RTP timeout for detecting dead channels
rtptimeout=120
rtpholdtimeout=300

; Enable RTP keepalive packets (important for NAT)
rtpkeepalive=30

; DTMF settings
dtmftimeout=3000

; ICE support (disable for carrier-grade systems)
icesupport=no
stunaddr=
turnaddr=

; Enable strict RTP learning (security feature)
strictrtp=yes

; Time to learn RTP source (security vs. compatibility)
probation=4

;============================================================================
; QUALITY OF SERVICE (QoS) SETTINGS
;============================================================================

; IPv4 Type of Service (ToS) for RTP packets
; EF (Expedited Forwarding) = 46 (0xB8) - Highest priority for voice
tos_audio=ef

; 802.1p Class of Service (CoS) for RTP packets
; Voice uses CoS 5
cos_audio=5

; Video settings (if needed in future)
tos_video=af41
cos_video=4

;============================================================================
; PERFORMANCE TUNING
;============================================================================

; Number of packets to buffer
; Lower = less latency, higher = better jitter handling
; For carrier-grade: 1-3 is recommended
;rtpbuffersize=3

;============================================================================
; END OF RTP CONFIGURATION
;============================================================================

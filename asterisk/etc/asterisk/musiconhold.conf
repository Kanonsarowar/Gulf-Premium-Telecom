;============================================================================
; Music On Hold Configuration for Gulf Premium Telecom - IPRN
; Purpose: Configure hold music for queues and transfers
; Version: Asterisk 16-20 compatible
;============================================================================

;----------------------------------------------------------------------------
; DEFAULT MUSIC CLASS
;----------------------------------------------------------------------------
[default]
; Mode: files = play files from directory
; Mode: quietmp3 = play MP3 files without transcoding
; Mode: custom = use custom application
mode=files

; Directory containing music files
; Supported formats: wav, gsm, mp3 (with format_mp3 module)
directory=/var/lib/asterisk/moh

; Sort method:
; - alpha: Alphabetical order
; - random: Random order (recommended)
; - randomstart: Random starting point, then sequential
sort=random

; Format (automatic if not specified)
;format=wav

; Application for custom mode (not used with files mode)
;application=/usr/bin/mpg123 -q -r 8000 -f 8192 -b 0 -s --mono

;----------------------------------------------------------------------------
; PREMIUM HOLD MUSIC (for VIP customers)
;----------------------------------------------------------------------------
[premium]
mode=files
directory=/var/lib/asterisk/moh/premium
sort=random

;----------------------------------------------------------------------------
; SALES HOLD MUSIC
;----------------------------------------------------------------------------
[sales]
mode=files
directory=/var/lib/asterisk/moh
sort=random

;----------------------------------------------------------------------------
; SUPPORT HOLD MUSIC
;----------------------------------------------------------------------------
[support]
mode=files
directory=/var/lib/asterisk/moh
sort=random

;============================================================================
; SETUP INSTRUCTIONS
;============================================================================
;
; 1. Create MOH directories:
;    mkdir -p /var/lib/asterisk/moh
;    mkdir -p /var/lib/asterisk/moh/premium
;
; 2. Add music files (WAV format recommended for best quality):
;    - Copy your music files to /var/lib/asterisk/moh/
;    - Use 8000Hz or 16000Hz sample rate
;    - Use mono (single channel)
;
; 3. Set proper permissions:
;    chown -R asterisk:asterisk /var/lib/asterisk/moh
;    chmod -R 755 /var/lib/asterisk/moh
;
; 4. Convert files if needed:
;    sox input.mp3 -r 8000 -c 1 -t wav output.wav
;
; 5. Test MOH:
;    asterisk -rvvv
;    moh show classes
;    moh show files
;
; 6. Reload MOH:
;    asterisk -rx "moh reload"
;
; RECOMMENDED FILES:
; - Use royalty-free or licensed music
; - Avoid copyrighted music without proper licensing
; - Consider professional on-hold message services
; - Mix music with periodic announcements
;
;============================================================================
; END OF MUSIC ON HOLD CONFIGURATION
;============================================================================

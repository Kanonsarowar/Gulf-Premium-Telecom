;============================================================================
; Logger Configuration for Gulf Premium Telecom - IPRN
; Purpose: Comprehensive logging for troubleshooting and monitoring
; Version: Asterisk 16-20 compatible
;============================================================================

[general]
; Log file rotation
dateformat=%F %T
; Append hostname to log messages
appendhostname=yes
; Queue log messages for better performance
queue_log=yes
queue_log_to_file=yes
queue_log_name=queue_log
queue_log_realtime_use_gmt=no

;============================================================================
; LOG FILES AND VERBOSITY LEVELS
;============================================================================
[logfiles]

; Console logging (when running asterisk -rvvv)
console => notice,warning,error,verbose

; Full debug log (for troubleshooting)
; WARNING: This generates large files - disable in production after troubleshooting
full => notice,warning,error,debug,verbose,dtmf,fax

; Messages log (standard operational log)
messages => notice,warning,error

; Security events
security => security

;----------------------------------------------------------------------------
; SIP/PJSIP SIGNALING LOGS (CRITICAL for troubleshooting call setup issues)
;----------------------------------------------------------------------------
; Uncomment during troubleshooting of inbound call issues
; IMPORTANT: Contains sensitive data - disable after fixing issues
;pjsip_debug => debug,notice,warning,error,verbose

;----------------------------------------------------------------------------
; RTP DEBUG (for audio/media troubleshooting)
;----------------------------------------------------------------------------
; Uncomment when debugging one-way audio, no audio, or poor quality issues
;rtp_debug => debug,dtmf

;----------------------------------------------------------------------------
; QUEUE LOGS (for call center monitoring)
;----------------------------------------------------------------------------
; Queue events for Asternic and other queue monitoring tools
queue_log => queue_log

;----------------------------------------------------------------------------
; CDR LOGS (Call Detail Records)
;----------------------------------------------------------------------------
; Uncomment for CDR debugging
;cdr_debug => cdr

;----------------------------------------------------------------------------
; DTMF LOGS (for IVR troubleshooting)
;----------------------------------------------------------------------------
; Uncomment when troubleshooting IVR issues
;dtmf => dtmf

;----------------------------------------------------------------------------
; ERROR ONLY LOG
;----------------------------------------------------------------------------
; Critical errors only
errors => error,warning

;============================================================================
; SYSLOG CONFIGURATION (Optional - for centralized logging)
;============================================================================
; To enable syslog, uncomment the following and install rsyslog
; Format: syslog.facility => levels
; Example: syslog.local0 => notice,warning,error

;============================================================================
; LOG ROTATION RECOMMENDATIONS
;============================================================================
; Use logrotate to manage Asterisk logs
; Example /etc/logrotate.d/asterisk:
;
; /var/log/asterisk/*log {
;     daily
;     rotate 30
;     missingok
;     notifempty
;     compress
;     delaycompress
;     sharedscripts
;     postrotate
;         /usr/sbin/asterisk -rx 'logger reload' > /dev/null 2>&1 || true
;     endscript
; }

;============================================================================
; DEBUGGING TIPS
;============================================================================
; 
; FOR INBOUND CALL ISSUES:
; 1. Enable pjsip_debug log above
; 2. Run: asterisk -rvvv
; 3. Run: pjsip set logger on
; 4. Run: rtp set debug on
; 5. Make test call
; 6. Run: pjsip set logger off
; 7. Run: rtp set debug off
; 8. Review logs in /var/log/asterisk/
;
; FOR QUEUE ISSUES:
; 1. Review /var/log/asterisk/queue_log
; 2. Run: queue show
; 3. Check agent availability
;
; FOR AUDIO ISSUES:
; 1. Enable rtp_debug log above
; 2. Run: rtp set debug on
; 3. Check firewall rules for UDP 10000-20000
; 4. Verify no NAT issues
; 5. Check codec compatibility
;
;============================================================================
; END OF LOGGER CONFIGURATION
;============================================================================

;============================================================================
; Asterisk Main Configuration for Gulf Premium Telecom - IPRN
; Purpose: Core Asterisk settings
; Version: Asterisk 16-20 compatible
;============================================================================

[directories](!)
; Standard Asterisk directories (adjust if using custom paths)
astetcdir => /etc/asterisk
astmoddir => /usr/lib/asterisk/modules
astvarlibdir => /var/lib/asterisk
astdatadir => /var/lib/asterisk
astagidir => /var/lib/asterisk/agi-bin
astspooldir => /var/spool/asterisk
astrundir => /var/run/asterisk
astlogdir => /var/log/asterisk
astsbindir => /usr/sbin

[options]
; Verbose level (0-10, higher = more output)
verbose=3

; Debug level (0-10, higher = more debug output)
debug=0

; Run as user/group (security)
runuser=asterisk
rungroup=asterisk

; Language code for system prompts
defaultlanguage=en

; Documentation base URL
documentation_language=en_US

; High priority mode (for real-time performance)
highpriority=yes

; Initialize crypto for secure calls
initcrypto=yes

; Transmit silence during recording
transmit_silence=yes

; Maximum load average before rejecting calls
; Uncomment to enable load-based call rejection
;maxload=12.0

; Maximum number of open files
maxfiles=10000

; Minimum amount of free memory (MB) before rejecting calls
; Uncomment to enable memory-based call rejection
;minmemfree=32

; Internal timing (important for MOH, conferencing)
internal_timing=yes

; System name (displayed in SIP messages)
systemname=Gulf-Premium-IPRN

; Maximum number of active calls (0 = unlimited)
; Set based on your capacity
maxcalls=1000

; Cache recorded sound files
cache_record_files=yes

; Record cache directory
record_cache_dir=/var/spool/asterisk/tmp

; Transmit DTMF as inband audio (vs RFC2833)
; Keep disabled for RFC2833 (recommended)
;transcode_via_sln=yes

;============================================================================
; COMPATIBILITY SETTINGS
;============================================================================

[compat]
; Compatibility with older versions
; Generally leave at defaults

; Asterisk 1.4 compatibility mode
;pbx_realtime=1.4

;============================================================================
; END OF ASTERISK MAIN CONFIGURATION
;============================================================================

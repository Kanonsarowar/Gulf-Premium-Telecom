version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:14-alpine
    container_name: gulf-postgres
    environment:
      POSTGRES_DB: gulf_premium_telecom
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - gulf-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: gulf-redis
    command: redis-server --requirepass redis_password
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - gulf-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: gulf-backend
    environment:
      DATABASE_URL: postgresql://asterisk_api:SecurePass123@postgres:5432/gulf_premium_telecom
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: gulf_premium_telecom
      DB_USER: asterisk_api
      DB_PASSWORD: SecurePass123
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: redis_password
      PORT: 3001
      NODE_ENV: production
      JWT_SECRET: change_this_in_production
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - gulf-network
    restart: unless-stopped
    volumes:
      - ./backend:/app
      - /app/node_modules
      - backend_logs:/var/log/gulf-premium-telecom

  # AGI Server
  agi:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: gulf-agi
    command: node dist/agi/server.js
    environment:
      DATABASE_URL: postgresql://asterisk_agi:AgiPass123@postgres:5432/gulf_premium_telecom
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: gulf_premium_telecom
      DB_USER: asterisk_agi
      DB_PASSWORD: AgiPass123
      AGI_PORT: 4573
      AGI_HOST: 0.0.0.0
      NODE_ENV: production
    ports:
      - "4573:4573"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - gulf-network
    restart: unless-stopped
    volumes:
      - ./backend:/app
      - /app/node_modules

  # Frontend (Next.js)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: gulf-frontend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3001
      NEXTAUTH_URL: http://localhost:3000
      NEXTAUTH_SECRET: change_this_in_production
      NODE_ENV: production
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - gulf-network
    restart: unless-stopped
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next

  # Nginx Reverse Proxy (Optional)
  nginx:
    image: nginx:alpine
    container_name: gulf-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - nginx_logs:/var/log/nginx
    depends_on:
      - frontend
      - backend
    networks:
      - gulf-network
    restart: unless-stopped

  # Adminer (Database Management UI)
  adminer:
    image: adminer:latest
    container_name: gulf-adminer
    ports:
      - "8080:8080"
    depends_on:
      - postgres
    networks:
      - gulf-network
    restart: unless-stopped

networks:
  gulf-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  backend_logs:
  nginx_logs:

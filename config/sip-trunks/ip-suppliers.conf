; Gulf Premium Telecom - IP Supplier Configuration
; ================================================
; This file contains IP addresses, ports, and codec configurations
; for SIP trunk suppliers used in the IPRN routing network.
;
; Last Updated: 2024
; Asterisk Version: 16-20
; Protocol: PJSIP (IP-to-IP, no registration required)

; ============================================================================
; Gulf Premium Telecom - Our IP Configuration
; ============================================================================

[gpt-trunk-endpoint]
type=endpoint
context=from-supplier
transport=transport-udp
disallow=all
allow=ulaw          ; G.711 μ-law (64kbps)
allow=alaw          ; G.711 A-law (64kbps)
allow=g729          ; G.729 (8kbps) - common in carrier networks
allow=g722          ; G.722 HD audio (64kbps)
direct_media=no     ; Force RTP through Asterisk for media anchoring
rtp_symmetric=yes   ; Essential for NAT traversal
rewrite_contact=yes ; Rewrite Contact header for NAT
from_domain=167.172.170.88
aors=gpt-trunk-aor
identify_by=ip

[gpt-trunk-aor]
type=aor
contact=sip:167.172.170.88:5060
qualify_frequency=60

[gpt-trunk-identify]
type=identify
endpoint=gpt-trunk-endpoint
match=167.172.170.88

; ============================================================================
; SIP/RTP Port Configuration
; ============================================================================
; SIP Signaling: UDP 5060 (default)
; RTP Media: UDP 10000-20000 (configured in rtp.conf)
;
; Ensure firewall rules allow:
; - Inbound/Outbound UDP 5060 (SIP signaling)
; - Inbound/Outbound UDP 10000-20000 (RTP media)

; ============================================================================
; Codec Priority and Selection
; ============================================================================
; Priority Order (as configured above):
; 1. ulaw (G.711μ) - Highest quality, most compatible, 87.2kbps bandwidth
; 2. alaw (G.711a) - European/Middle East standard, 87.2kbps bandwidth
; 3. g729 (G.729)  - Compressed, good quality, 31.2kbps bandwidth
; 4. g722 (G.722)  - HD audio when available, 87.2kbps bandwidth
;
; Codec selection is negotiated during SIP INVITE/200 OK exchange.
; First matching codec in both endpoints' allow lists will be used.

; ============================================================================
; IP Supplier List - Add additional suppliers below
; ============================================================================
; Template for adding new suppliers:
;
; [supplier-name-endpoint]
; type=endpoint
; context=from-supplier
; transport=transport-udp
; disallow=all
; allow=ulaw
; allow=alaw
; allow=g729
; direct_media=no
; rtp_symmetric=yes
; rewrite_contact=yes
; aors=supplier-name-aor
; identify_by=ip
;
; [supplier-name-aor]
; type=aor
; contact=sip:SUPPLIER_IP:PORT
; qualify_frequency=60
;
; [supplier-name-identify]
; type=identify
; endpoint=supplier-name-endpoint
; match=SUPPLIER_IP

; ============================================================================
; Notes for Production Deployment
; ============================================================================
; 1. Include this file in pjsip.conf using: #include sip-trunks/ip-suppliers.conf
; 2. Verify transport-udp is configured in main pjsip.conf
; 3. Ensure RTP ports 10000-20000 are configured in rtp.conf
; 4. Test with: pjsip show endpoints
; 5. Monitor SIP: pjsip set logger on
; 6. Monitor RTP: rtp set debug on
; 7. For NAT environments, ensure external_media_address and external_signaling_address
;    are properly configured in pjsip.conf transport section

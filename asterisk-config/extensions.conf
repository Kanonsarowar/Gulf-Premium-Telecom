; Dialplan Configuration for Gulf Premium Telecom
; Place this file in /etc/asterisk/extensions.conf or your Asterisk config directory

[general]
static=yes
writeprotect=no

; Internal context for SIP extensions
[internal]
exten => _1XXX,1,Dial(SIP/${EXTEN},20)
exten => _1XXX,n,Hangup()

; Incoming call context with IVR
[from-trunk]
; Set IVR variables for tracking
exten => _X.,1,Set(IVR_CALL_ID=${UNIQUEID})
exten => _X.,n,Set(IVR_START_TIME=${STRFTIME(${EPOCH},,%Y-%m-%d %H:%M:%S)})
exten => _X.,n,Set(IVR_SUPPLIER=${CHANNEL(peername)})
exten => _X.,n,Answer()
exten => _X.,n,Wait(1)
exten => _X.,n,Goto(ivr-main,s,1)

; Incoming call context for E.164 formatted calls (Quintum Gateway)
[from-trunk-e164]
; Set IVR variables for tracking
exten => _+X.,1,Set(IVR_CALL_ID=${UNIQUEID})
exten => _+X.,n,Set(IVR_START_TIME=${STRFTIME(${EPOCH},,%Y-%m-%d %H:%M:%S)})
exten => _+X.,n,Set(IVR_SUPPLIER=supplier3-quintum)
exten => _+X.,n,Set(IVR_E164_NUMBER=${EXTEN})
exten => _+X.,n,Answer()
exten => _+X.,n,Wait(1)
exten => _+X.,n,Goto(ivr-main,s,1)

; Also handle calls without + prefix from E.164 trunk
exten => _X.,1,Set(IVR_CALL_ID=${UNIQUEID})
exten => _X.,n,Set(IVR_START_TIME=${STRFTIME(${EPOCH},,%Y-%m-%d %H:%M:%S)})
exten => _X.,n,Set(IVR_SUPPLIER=supplier3-quintum)
exten => _X.,n,Answer()
exten => _X.,n,Wait(1)
exten => _X.,n,Goto(ivr-main,s,1)

; Main IVR Menu
[ivr-main]
exten => s,1,Background(welcome)  ; Play welcome message
exten => s,n,Background(ivr-menu)  ; Play menu options
exten => s,n,WaitExten(10)
exten => s,n,Goto(s,1)  ; Loop if no input

; IVR Option 1 - Sales
exten => 1,1,Set(IVR_OPTION=sales)
exten => 1,n,Playback(connecting-to-sales)
exten => 1,n,Dial(SIP/1000,30)
exten => 1,n,Voicemail(1000@default)
exten => 1,n,Hangup()

; IVR Option 2 - Support
exten => 2,1,Set(IVR_OPTION=support)
exten => 2,n,Playback(connecting-to-support)
exten => 2,n,Dial(SIP/1001,30)
exten => 2,n,Voicemail(1001@default)
exten => 2,n,Hangup()

; IVR Option 3 - Billing
exten => 3,1,Set(IVR_OPTION=billing)
exten => 3,n,Playback(billing-info)
exten => 3,n,Hangup()

; IVR Option 9 - Operator
exten => 9,1,Set(IVR_OPTION=operator)
exten => 9,n,Playback(transferring-to-operator)
exten => 9,n,Dial(SIP/1000,30)
exten => 9,n,Hangup()

; IVR Option 0 - Repeat menu
exten => 0,1,Goto(ivr-main,s,1)

; Invalid option
exten => i,1,Playback(invalid)
exten => i,n,Goto(s,1)

; Timeout
exten => t,1,Playback(goodbye)
exten => t,n,Hangup()

; Hangup handling
exten => h,1,NoOp(Call ended)

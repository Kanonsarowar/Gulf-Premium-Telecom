; SIP Configuration for Gulf Premium Telecom
; Place this file in /etc/asterisk/sip.conf or your Asterisk config directory

[general]
context=default
bindport=5060
bindaddr=0.0.0.0
srvlookup=yes
allowguest=yes
alwaysauthreject=yes
canreinvite=no
nat=force_rport,comedia
session-timers=refuse

; Codecs
disallow=all
allow=ulaw
allow=alaw
allow=gsm
allow=g729

; ============================================================================
; SIP TRUNK CONFIGURATIONS FOR INBOUND CALLS
; Your Asterisk Server IP: 167.172.170.88
; ============================================================================

; Supplier Group 1 - General SIP Trunks
; These suppliers will send calls to your server
[supplier1-trunk1]
type=friend
host=108.61.70.46
context=from-trunk
dtmfmode=rfc2833
insecure=port,invite
nat=force_rport,comedia
canreinvite=no
qualify=yes
disallow=all
allow=ulaw
allow=alaw
allow=gsm
allow=g729


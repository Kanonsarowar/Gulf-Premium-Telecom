; SIP Configuration for Gulf Premium Telecom
; Place this file in /etc/asterisk/sip.conf or your Asterisk config directory

[general]
context=default
bindport=5060
bindaddr=0.0.0.0
srvlookup=yes
allowguest=yes
alwaysauthreject=yes
canreinvite=no
nat=force_rport,comedia
session-timers=refuse

; Codecs
disallow=all
allow=ulaw
allow=alaw
allow=gsm

; Example SIP Trunk Configuration
; Uncomment and configure according to your SIP provider
;[siptrunk]
;type=friend
;host=sip.provider.com
;context=from-trunk
;dtmfmode=rfc2833
;insecure=port,invite
;canreinvite=no

; Example SIP User/Extension
[1000]
type=friend
context=internal
secret=password1000
host=dynamic
nat=force_rport,comedia
canreinvite=no
qualify=yes

[1001]
type=friend
context=internal
secret=password1001
host=dynamic
nat=force_rport,comedia
canreinvite=no
qualify=yes

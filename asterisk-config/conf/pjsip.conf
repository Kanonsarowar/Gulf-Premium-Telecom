; ============================================================================
; Gulf Premium Telecom - PJSIP Configuration
; ============================================================================
; This configuration handles:
; - IP-based carrier inbound trunks (no authentication required)
; - Twilio SIP trunk for outbound calls
; - Security via IP ACLs
; ============================================================================

; ----------------------------------------------------------------------------
; TRANSPORT CONFIGURATION
; ----------------------------------------------------------------------------
; UDP transport for SIP signaling
[transport-udp]
type=transport
protocol=udp
bind=0.0.0.0:5060
external_media_address=YOUR_PUBLIC_IP
external_signaling_address=YOUR_PUBLIC_IP
; Adjust local_net for your internal network if behind NAT
local_net=192.168.0.0/16
local_net=10.0.0.0/8
local_net=172.16.0.0/12

; TCP transport (optional, for carriers requiring TCP)
[transport-tcp]
type=transport
protocol=tcp
bind=0.0.0.0:5060

; ----------------------------------------------------------------------------
; ACCESS CONTROL LISTS (ACLs)
; ----------------------------------------------------------------------------
; Define trusted carrier IP addresses/ranges
; IMPORTANT: Replace these with your actual carrier IP addresses

[acl-carrier1]
type=acl
deny=0.0.0.0/0
permit=203.0.113.0/24
; Add more carrier IPs as needed
; permit=198.51.100.5
; permit=192.0.2.0/24

[acl-carrier2]
type=acl
deny=0.0.0.0/0
permit=198.51.100.0/24

[acl-twilio]
type=acl
deny=0.0.0.0/0
; Twilio Media Region IPs - Update based on your region
; See: https://www.twilio.com/docs/sip-trunking/ip-addresses
permit=54.172.60.0/23
permit=54.244.51.0/24
permit=177.71.206.0/23
; Add all Twilio IPs for your region

; ----------------------------------------------------------------------------
; CARRIER INBOUND TRUNKS (IP-Based Authentication)
; ----------------------------------------------------------------------------
; Template for carrier endpoints
[carrier-endpoint-template](!)
type=endpoint
context=from-carriers
dtmf_mode=rfc4733
disallow=all
allow=ulaw
allow=alaw
allow=g729
direct_media=no
trust_id_inbound=yes
send_pai=yes
from_domain=${EXTEN}
rtp_symmetric=yes
force_rport=yes
rewrite_contact=yes
; Media handling
media_encryption=no
use_avpf=no
; Timers
timers=yes
; NAT handling
rtp_timeout=120
rtp_timeout_hold=300

[carrier-endpoint-template-identify](!)
type=identify
match_header=From

; Carrier 1 Configuration
[carrier1-trunk]
type=endpoint
(carrier-endpoint-template)
acl=acl-carrier1
set_var=CARRIER=CARRIER1

[carrier1-identify]
type=identify
endpoint=carrier1-trunk
match=203.0.113.0/24
; Add additional carrier1 IPs
; match=203.0.113.50

; Carrier 2 Configuration
[carrier2-trunk]
type=endpoint
(carrier-endpoint-template)
acl=acl-carrier2
set_var=CARRIER=CARRIER2

[carrier2-identify]
type=identify
endpoint=carrier2-trunk
match=198.51.100.0/24

; ----------------------------------------------------------------------------
; TWILIO OUTBOUND TRUNK
; ----------------------------------------------------------------------------
; Twilio Endpoint Configuration
[twilio-trunk]
type=endpoint
context=from-twilio
transport=transport-udp
; Authentication
aors=twilio-trunk
outbound_auth=twilio-auth
; Codecs
disallow=all
allow=ulaw
allow=alaw
; SIP Settings
from_user=YOUR_TWILIO_USERNAME
from_domain=YOUR_TWILIO_DOMAIN.pstn.twilio.com
; Media
direct_media=no
media_encryption=no
dtmf_mode=rfc4733
rtp_symmetric=yes
force_rport=yes
rewrite_contact=yes
send_rpid=yes
send_pai=yes
trust_id_outbound=yes
; Timers and keepalive
timers=yes
; NAT handling
rtp_timeout=120
rtp_timeout_hold=300
; Variables
set_var=CHANNEL_TYPE=TWILIO

; Twilio AOR (Address of Record)
[twilio-trunk]
type=aor
contact=sip:YOUR_TWILIO_DOMAIN.pstn.twilio.com
qualify_frequency=60
; Twilio requires outbound registration for some setups
; If you need registration, uncomment and configure below:
; outbound_proxy=sip:YOUR_TWILIO_DOMAIN.pstn.twilio.com

; Twilio Authentication
[twilio-auth]
type=auth
auth_type=userpass
username=YOUR_TWILIO_USERNAME
password=YOUR_TWILIO_PASSWORD

; Twilio Identification (for incoming calls from Twilio)
[twilio-identify]
type=identify
endpoint=twilio-trunk
match=54.172.60.0/23
match=54.244.51.0/24
match=177.71.206.0/23
; Add all Twilio IPs for your region

; Registration (if required by Twilio)
; Uncomment and configure if needed
; [twilio-registration]
; type=registration
; outbound_auth=twilio-auth
; server_uri=sip:YOUR_TWILIO_DOMAIN.pstn.twilio.com
; client_uri=sip:YOUR_TWILIO_USERNAME@YOUR_TWILIO_DOMAIN.pstn.twilio.com
; retry_interval=60
; max_retries=10
; contact_user=YOUR_TWILIO_USERNAME

; ----------------------------------------------------------------------------
; GLOBAL SETTINGS
; ----------------------------------------------------------------------------
[global]
type=global
max_forwards=70
user_agent=Gulf Premium Telecom PBX
default_outbound_endpoint=twilio-trunk
keep_alive_interval=90

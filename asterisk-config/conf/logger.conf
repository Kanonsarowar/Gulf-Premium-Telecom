; ============================================================================
; Gulf Premium Telecom - Logger Configuration
; ============================================================================
; Logging configuration for debugging and monitoring
; ============================================================================

[general]
; Timestamps - include date/time in logs
dateformat=%F %T

; Queue log
queue_log=yes
queue_log_to_file=yes
queue_log_name=queue_log

; Realtime logging
queue_log_realtime_use_gmtime=no

[logfiles]
; Console logging (when running asterisk -r)
console => notice,warning,error

; Full log - all messages
full => notice,warning,error,debug,verbose

; Messages log - important events only  
messages => notice,warning,error

; Security events
security => security

; Queue events (for Asternic and call center monitoring)
queue_events => notice,warning,error,queue

; PJSIP specific logging
pjsip => notice,warning,error

; CDR logging
cdr => notice,warning,error

; DTMF logging (useful for IVR debugging)
dtmf => notice,warning,error,dtmf

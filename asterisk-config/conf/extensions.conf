; ============================================================================
; Gulf Premium Telecom - Dialplan Configuration
; ============================================================================
; This dialplan handles:
; - Inbound calls from carriers with IVR
; - Outbound calls via Twilio
; - Call routing and management
; ============================================================================

[general]
static=yes
writeprotect=no
clearglobalvars=no
priorityjumping=no

[globals]
; Global Variables
CONSOLE=Console/dsp
IAXINFO=guest
TRUNK=PJSIP/twilio-trunk
TWILIO_TRUNK=twilio-trunk

; DID to extension mapping (customize as needed)
DID_MAPPING=1

; Twilio outbound settings
TWILIO_CALLER_ID=+1234567890

; Recording path
RECORDING_PATH=/var/spool/asterisk/monitor

; IVR audio files path (relative to /var/lib/asterisk/sounds/)
IVR_WELCOME=custom/welcome
IVR_INVALID=custom/invalid-option
IVR_TIMEOUT=custom/timeout

; ----------------------------------------------------------------------------
; INBOUND CALLS FROM CARRIERS (IP-Based)
; ----------------------------------------------------------------------------
[from-carriers]
; This context handles all inbound calls from carrier trunks
; Calls arrive here from carrier1-trunk and carrier2-trunk

; Log the incoming call
exten => _X.,1,NoOp(========== Incoming Call from Carrier ==========)
 same => n,NoOp(DID: ${EXTEN})
 same => n,NoOp(CallerID: ${CALLERID(all)})
 same => n,NoOp(Carrier: ${CARRIER})
 same => n,NoOp(Channel: ${CHANNEL})
 same => n,Set(CDR(carrier)=${CARRIER})
 
; Answer the call
 same => n,Answer()
 same => n,Wait(1)

; Set channel variables
 same => n,Set(CHANNEL(language)=en)
 same => n,Set(TIMEOUT(digit)=5)
 same => n,Set(TIMEOUT(response)=10)

; Optional: Record call for quality assurance
; Uncomment the following line to enable call recording
; same => n,MixMonitor(${RECORDING_PATH}/${UNIQUEID}.wav,b)

; Route to IVR
 same => n,Goto(ivr-main,s,1)

; Catch invalid extensions
exten => i,1,NoOp(Invalid extension dialed)
 same => n,Playback(invalid)
 same => n,Hangup()

exten => t,1,NoOp(Timeout - no input received)
 same => n,Playback(vm-goodbye)
 same => n,Hangup()

; ----------------------------------------------------------------------------
; MAIN IVR MENU
; ----------------------------------------------------------------------------
[ivr-main]
; Main IVR greeting and menu

exten => s,1,NoOp(========== Entering Main IVR ==========)
 same => n,Set(IVR_ATTEMPTS=0)
 same => n(start),Set(IVR_ATTEMPTS=$[${IVR_ATTEMPTS} + 1])
 
; Check maximum attempts
 same => n,GotoIf($[${IVR_ATTEMPTS} > 3]?timeout)
 
; Play welcome message and menu
 same => n,Background(${IVR_WELCOME})
 same => n,Background(custom/ivr-menu)
 ; Menu options:
 ; Press 1 for Sales
 ; Press 2 for Support
 ; Press 3 for Billing
 ; Press 0 for Operator
 ; Press 9 to repeat this menu
 
 same => n,WaitExten(10)

; Invalid option handling
exten => i,1,NoOp(Invalid option selected)
 same => n,Playback(${IVR_INVALID})
 same => n,Goto(s,start)

; Timeout handling
exten => t,1,NoOp(IVR timeout - no input)
 same => n(timeout),Playback(${IVR_TIMEOUT})
 same => n,Playback(vm-goodbye)
 same => n,Hangup()

; Option 1 - Sales Department
exten => 1,1,NoOp(Selected: Sales)
 same => n,Playback(pls-wait-connect-call)
 same => n,Goto(internal-extensions,100,1)

; Option 2 - Support Department  
exten => 2,1,NoOp(Selected: Support)
 same => n,Playback(pls-wait-connect-call)
 same => n,Goto(internal-extensions,200,1)

; Option 3 - Billing Department
exten => 3,1,NoOp(Selected: Billing)
 same => n,Playback(pls-wait-connect-call)
 same => n,Goto(internal-extensions,300,1)

; Option 0 - Operator
exten => 0,1,NoOp(Selected: Operator)
 same => n,Playback(pls-wait-connect-call)
 same => n,Goto(internal-extensions,0,1)

; Option 9 - Repeat menu
exten => 9,1,NoOp(Repeat menu requested)
 same => n,Goto(s,start)

; ----------------------------------------------------------------------------
; INTERNAL EXTENSIONS
; ----------------------------------------------------------------------------
[internal-extensions]
; Extension 100 - Sales Department
exten => 100,1,NoOp(Routing to Sales - Extension 100)
 same => n,Set(CALLERID(name)=Sales Caller)
 ; Option 1: Ring a SIP extension
 ; same => n,Dial(PJSIP/100,30,t)
 ; Option 2: Ring multiple extensions (ring group)
 ; same => n,Dial(PJSIP/100&PJSIP/101&PJSIP/102,30,t)
 ; Option 3: Forward to external number via Twilio
 same => n,Set(CALLERID(num)=${TWILIO_CALLER_ID})
 same => n,Dial(PJSIP/+1234567100@${TWILIO_TRUNK},60,t)
 same => n,GotoIf($["${DIALSTATUS}" = "ANSWER"]?answered)
 same => n,NoOp(Call not answered: ${DIALSTATUS})
 same => n,Voicemail(100@default,u)
 same => n,Hangup()
 same => n(answered),NoOp(Call answered successfully)
 same => n,Hangup()

; Extension 200 - Support Department
exten => 200,1,NoOp(Routing to Support - Extension 200)
 same => n,Set(CALLERID(name)=Support Caller)
 same => n,Set(CALLERID(num)=${TWILIO_CALLER_ID})
 same => n,Dial(PJSIP/+1234567200@${TWILIO_TRUNK},60,t)
 same => n,GotoIf($["${DIALSTATUS}" = "ANSWER"]?answered)
 same => n,Voicemail(200@default,u)
 same => n,Hangup()
 same => n(answered),Hangup()

; Extension 300 - Billing Department
exten => 300,1,NoOp(Routing to Billing - Extension 300)
 same => n,Set(CALLERID(name)=Billing Caller)
 same => n,Set(CALLERID(num)=${TWILIO_CALLER_ID})
 same => n,Dial(PJSIP/+1234567300@${TWILIO_TRUNK},60,t)
 same => n,GotoIf($["${DIALSTATUS}" = "ANSWER"]?answered)
 same => n,Voicemail(300@default,u)
 same => n,Hangup()
 same => n(answered),Hangup()

; Extension 0 - Operator
exten => 0,1,NoOp(Routing to Operator)
 same => n,Set(CALLERID(name)=Operator Call)
 same => n,Set(CALLERID(num)=${TWILIO_CALLER_ID})
 same => n,Dial(PJSIP/+1234567000@${TWILIO_TRUNK},60,t)
 same => n,GotoIf($["${DIALSTATUS}" = "ANSWER"]?answered)
 same => n,Playback(im-sorry)
 same => n,Playback(nbdy-avail-to-take-call)
 same => n,Hangup()
 same => n(answered),Hangup()

; Fallback for unhandled extensions
exten => _X.,1,NoOp(Unhandled internal extension: ${EXTEN})
 same => n,Playback(invalid)
 same => n,Hangup()

; ----------------------------------------------------------------------------
; OUTBOUND CALLS VIA TWILIO
; ----------------------------------------------------------------------------
[outbound-twilio]
; Context for outbound calls through Twilio
; Usage: Dial(Local/18005551234@outbound-twilio)

exten => _X.,1,NoOp(========== Outbound Call via Twilio ==========)
 same => n,NoOp(Destination: ${EXTEN})
 same => n,NoOp(CallerID: ${CALLERID(all)})

; Set caller ID (must be a verified number in Twilio)
 same => n,Set(CALLERID(num)=${TWILIO_CALLER_ID})

; Dial via Twilio trunk
 same => n,Dial(PJSIP/${EXTEN}@${TWILIO_TRUNK},120,rt)
 
; Handle dial status
 same => n,NoOp(Dial Status: ${DIALSTATUS})
 same => n,GotoIf($["${DIALSTATUS}" = "ANSWER"]?answered)
 same => n,GotoIf($["${DIALSTATUS}" = "BUSY"]?busy)
 same => n,GotoIf($["${DIALSTATUS}" = "NOANSWER"]?noanswer)
 same => n,GotoIf($["${DIALSTATUS}" = "CONGESTION"]?congestion)
 same => n,Goto(failed)

 same => n(answered),NoOp(Call answered successfully)
 same => n,Hangup()

 same => n(busy),NoOp(Destination busy)
 same => n,Playback(number-busy)
 same => n,Hangup()

 same => n(noanswer),NoOp(No answer)
 same => n,Playback(call-rejected)
 same => n,Hangup()

 same => n(congestion),NoOp(Congestion)
 same => n,Playback(all-circuits-busy-now)
 same => n,Hangup()

 same => n(failed),NoOp(Call failed)
 same => n,Playback(call-rejected)
 same => n,Hangup()

; ----------------------------------------------------------------------------
; INBOUND FROM TWILIO (Optional - for DID management)
; ----------------------------------------------------------------------------
[from-twilio]
; This context handles calls originating from Twilio
; Useful if you have Twilio DIDs that forward to your Asterisk

exten => _X.,1,NoOp(========== Inbound from Twilio ==========)
 same => n,NoOp(DID: ${EXTEN})
 same => n,NoOp(CallerID: ${CALLERID(all)})
 same => n,Answer()
 same => n,Wait(1)
 
; Route based on DID or to IVR
 same => n,Goto(ivr-main,s,1)

; ----------------------------------------------------------------------------
; TESTING AND DIAGNOSTICS
; ----------------------------------------------------------------------------
[testing]
; Echo test - useful for testing connectivity
exten => 600,1,NoOp(Echo Test)
 same => n,Answer()
 same => n,Playback(demo-echotest)
 same => n,Echo()
 same => n,Playback(demo-echodone)
 same => n,Hangup()

; Music on Hold test
exten => 601,1,NoOp(Music on Hold Test)
 same => n,Answer()
 same => n,MusicOnHold()

; Conference room test
exten => 700,1,NoOp(Conference Room)
 same => n,Answer()
 same => n,ConfBridge(700)
 same => n,Hangup()

; ----------------------------------------------------------------------------
; HANGUP HANDLER
; ----------------------------------------------------------------------------
[hangup-handler]
exten => s,1,NoOp(========== Call Completed ==========)
 same => n,NoOp(Duration: ${CDR(duration)} seconds)
 same => n,NoOp(Status: ${DIALSTATUS})
 same => n,Return()

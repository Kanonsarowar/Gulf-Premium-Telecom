; ============================================================================
; Gulf Premium Telecom - Voicemail Configuration
; ============================================================================

[general]
; Format for storing voicemail
format=wav
; Maximum greeting length (seconds)
maxgreet=60
; Maximum message length (seconds)
maxmessage=180
; Minimum message length (seconds)
minmessage=3
; Maximum messages per mailbox
maxmsg=100
; Skip password check for internal calls
skipms=3000
; Maximum silence (seconds)
maxsilence=10
; Silence threshold (lower = more sensitive)
silencethreshold=128
; Operator extension
operator=yes
; Review messages
review=yes
; Email body
emailbody=Dear ${VM_NAME},\n\nYou have a new voicemail in mailbox ${VM_MAILBOX}.\n\nDuration: ${VM_DUR}\nCaller ID: ${VM_CALLERID}\nDate: ${VM_DATE}\n\nThank you.

[zonemessages]
eastern=America/New_York|'vm-received' Q 'digits/at' IMp
central=America/Chicago|'vm-received' Q 'digits/at' IMp
central24=America/Chicago|'vm-received' q 'digits/at' H N 'hours'

[default]
; Voicemail boxes
; Format: mailbox => password,name,email,pager_email,options
100 => 1234,Sales Department,sales@gulfpremium.com
200 => 1234,Support Department,support@gulfpremium.com
300 => 1234,Billing Department,billing@gulfpremium.com

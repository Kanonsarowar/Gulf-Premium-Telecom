; ============================================================================
; Gulf Premium Telecom - Modules Configuration
; ============================================================================
; Load only necessary modules for optimal performance
; ============================================================================

[modules]
autoload=yes

; ----------------------------------------------------------------------------
; REQUIRED PJSIP MODULES
; ----------------------------------------------------------------------------
load => res_pjsip.so
load => res_pjsip_session.so
load => res_pjsip_endpoint_identifier_ip.so
load => res_pjsip_authenticator_digest.so
load => res_pjsip_outbound_authenticator_digest.so
load => res_pjsip_acl.so
load => res_pjsip_caller_id.so
load => res_pjsip_registrar.so
load => res_pjsip_transport_management.so
load => res_pjsip_nat.so
load => res_pjsip_sdp_rtp.so
load => res_pjsip_outbound_registration.so
load => res_pjsip_t38.so
load => res_pjsip_dtmf_info.so
load => res_pjsip_rfc3326.so
load => res_pjsip_refer.so
load => res_pjsip_notify.so

; PJSIP channel driver
load => chan_pjsip.so

; ----------------------------------------------------------------------------
; RTP AND CODEC MODULES
; ----------------------------------------------------------------------------
load => res_rtp_asterisk.so
load => codec_ulaw.so
load => codec_alaw.so
load => codec_gsm.so
load => codec_g729.so
load => codec_g722.so
load => format_wav.so
load => format_pcm.so
load => format_gsm.so

; ----------------------------------------------------------------------------
; DIALPLAN AND APPLICATIONS
; ----------------------------------------------------------------------------
load => pbx_config.so
load => app_dial.so
load => app_playback.so
load => app_voicemail.so
load => app_directory.so
load => app_echo.so
load => app_mixmonitor.so
load => app_record.so
load => app_queue.so
load => app_stack.so
load => app_verbose.so
load => app_waitforsilence.so
load => app_background.so
load => app_confbridge.so

; ----------------------------------------------------------------------------
; CDR MODULES
; ----------------------------------------------------------------------------
load => cdr_csv.so
load => cdr_custom.so
load => app_cdr.so

; ----------------------------------------------------------------------------
; FUNCTIONS
; ----------------------------------------------------------------------------
load => func_callerid.so
load => func_cdr.so
load => func_channel.so
load => func_db.so
load => func_strings.so
load => func_timeout.so
load => func_logic.so

; ----------------------------------------------------------------------------
; RESOURCES
; ----------------------------------------------------------------------------
load => res_timing_timerfd.so
load => res_musiconhold.so

; ----------------------------------------------------------------------------
; OPTIONAL: AGI (Asterisk Gateway Interface)
; ----------------------------------------------------------------------------
; load => res_agi.so

; ----------------------------------------------------------------------------
; DO NOT LOAD (Legacy SIP - we use PJSIP)
; ----------------------------------------------------------------------------
noload => chan_sip.so

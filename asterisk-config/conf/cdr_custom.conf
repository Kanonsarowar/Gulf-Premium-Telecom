[mappings]
; Custom CDR mapping with additional fields
; Format: FieldName => Value

Master.csv => "${CSV_QUOTE(${CDR(clid)})},${CSV_QUOTE(${CDR(src)})},${CSV_QUOTE(${CDR(dst)})},${CSV_QUOTE(${CDR(dcontext)})},${CSV_QUOTE(${CDR(channel)})},${CSV_QUOTE(${CDR(dstchannel)})},${CSV_QUOTE(${CDR(lastapp)})},${CSV_QUOTE(${CDR(lastdata)})},${CSV_QUOTE(${CDR(start)})},${CSV_QUOTE(${CDR(answer)})},${CSV_QUOTE(${CDR(end)})},${CDR(duration)},${CDR(billsec)},${CSV_QUOTE(${CDR(disposition)})},${CSV_QUOTE(${CDR(amaflags)})},${CSV_QUOTE(${CDR(accountcode)})},${CSV_QUOTE(${CDR(uniqueid)})},${CSV_QUOTE(${CDR(userfield)})},${CSV_QUOTE(${CDR(carrier)})},${CSV_QUOTE(${CDR(did)})}"

; Simple format for analysis
Simple.csv => "${CDR(start)},${CDR(src)},${CDR(dst)},${CDR(duration)},${CDR(billsec)},${CDR(disposition)},${CDR(carrier)}"

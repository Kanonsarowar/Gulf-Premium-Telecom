; ============================================================================
; Gulf Premium Telecom - Main Asterisk Configuration
; ============================================================================

[directories](!)
astetcdir => /etc/asterisk
astmoddir => /usr/lib/asterisk/modules
astvarlibdir => /var/lib/asterisk
astdatadir => /var/lib/asterisk
astagidir => /var/lib/asterisk/agi-bin
astspooldir => /var/spool/asterisk
astrundir => /var/run/asterisk
astlogdir => /var/log/asterisk
astsbindir => /usr/sbin

[options]
; Verbose level
verbose = 3

; Debug level (0 = off, higher = more debug)
debug = 0

; Enable internal timing
internal_timing = yes

; System name
systemname = Gulf-Premium-Telecom

; Maximum number of open files
maxfiles = 10000

; Maximum load average before refusing new calls
maxload = 2.0

; Default language
defaultlanguage = en

; Documentation URL
documentation_language = en_US

; Run as user/group
runuser = asterisk
rungroup = asterisk

; High priority for better audio quality
highpriority = yes

; Core dump settings
dumpcore = no

; Transmit silence while recording
transmit_silence = yes

; Console color
;!include manager.conf

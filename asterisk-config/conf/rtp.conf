; ============================================================================
; Gulf Premium Telecom - RTP Configuration
; ============================================================================
; RTP (Real-time Transport Protocol) settings for voice/media
; ============================================================================

[general]
; RTP port range - standard range for VoIP
; Make sure these ports are open in your firewall for UDP traffic
rtpstart=10000
rtpend=20000

; Enable RTP checksums (recommended for production)
rtpchecksums=yes

; DTMF mode settings
dtmftimeout=3000

; RTP timeout values (in seconds)
; If no RTP is received for this time, the call may be dropped
rtptimeout=60

; RTP hold timeout (in seconds)  
; Timeout during call hold when no RTP is expected
rtpholdtimeout=300

; RTP keepalive interval (in seconds)
; Send keepalive packets to maintain NAT mappings
rtpkeepalive=15

; Enable strict RTP learning
; This helps prevent RTP injection attacks
strictrtp=yes

; Probation period for RTP learning (number of packets)
probation=4

; ICE support (Interactive Connectivity Establishment)
; Useful for NAT traversal but not typically needed for carrier trunks
icesupport=no

; STUN server configuration (if needed for NAT traversal)
; stunaddr=stun.l.google.com:19302

; TURN server configuration (if needed)
; turnaddr=turn.example.com
; turnusername=username  
; turnpassword=password

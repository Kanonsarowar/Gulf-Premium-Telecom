; ============================================================================
; Gulf Premium Telecom - CDR Configuration
; ============================================================================
; Call Detail Records configuration for billing and reporting
; ============================================================================

[general]
; Enable CDR
enable=yes

; CDR batch mode settings
; Batch mode improves performance by writing CDRs in batches
batch=no
size=100
time=300

; Scheduler settings
scheduleronly=no

; Safe shutdown - wait for CDRs to be written before shutdown
safeshutdown=yes

; End before h exten - log CDR before hangup extension
endbeforehexten=yes

; Initiated seconds - include time before answer
initiatedseconds=no

; CDR settings
unanswered=yes
congestion=yes

; Party A (caller) settings - always log
party_a=yes
